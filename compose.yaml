services:
  mcp:
    build: .
    image: mcp-boilerplate
    ports:
      - '3000:3000'
    environment:
      MCP_TRANSPORT: http
      HOST: 0.0.0.0
      PORT: '3000'
      ALLOWED_HOSTS: localhost,127.0.0.1
      LOG_LEVEL: info
      NODE_ENV: production
      # Enable bearer auth by uncommenting and supplying tokens:
      # AUTH_ENABLED: 'true'
      # AUTH_TOKENS: 'replace-with-a-strong-token'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
